
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SYSARP - Corpo de BomBEIROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sysarp: {
                primary: '#b91c1c', 
                dark: '#7f1d1d',    
                light: '#fca5a5',   
                accent: '#fbbf24',  
              }
            },
            zIndex: {
              'map': '0',
              'dropdown': '1000',
              'modal': '2000',
              'toast': '3000',
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <style>
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background-color: #b91c1c; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background-color: #7f1d1d; }
      .leaflet-container { width: 100%; height: 100%; z-index: 0 !important; background: #e5e7eb; }
      .leaflet-pane { z-index: 10 !important; }
      .leaflet-top, .leaflet-bottom { z-index: 20 !important; }
      img { max-width: 100%; height: auto; display: block; }
      img:not([src]):not([srcset]) { visibility: hidden; }  
      .animate-fade-in { animation: fadeIn 0.3s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      body { background-color: #ffffff; color: #1e293b; -webkit-font-smoothing: antialiased; }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
